appId: com.anonymous.Anyvoc
name: "Add text content flow"
---
- launchApp
- waitForAnimationToEnd

# Set native=English, learning=German, level=A1
- tapOn:
    id: "settings-btn"
- waitForAnimationToEnd
- tapOn:
    id: "native-language-btn"
- waitForAnimationToEnd
- tapOn: "English"
- waitForAnimationToEnd
- tapOn:
    id: "learning-language-btn"
- waitForAnimationToEnd
- tapOn: "Deutsch"
- waitForAnimationToEnd
- tapOn: "A1"
- tapOn:
    id: "settings-close-btn"
- waitForAnimationToEnd

# Navigate to Content tab
- tapOn: "Content"
- waitForAnimationToEnd
- assertVisible:
    id: "content-screen"

# Open add menu
- tapOn: "Add"
- waitForAnimationToEnd
- tapOn:
    id: "menu-enter-text"
- waitForAnimationToEnd

# Type content in text area (has autoFocus). Title is auto-derived
# from the first chars of the text — no separate title field exists.
- tapOn:
    id: "text-input"
- waitForAnimationToEnd
- inputText: "Der Hund spielt im Garten und die Katze schlaeft auf dem Sofa"

# Save and wait for processing + dismiss Done dialog
- tapOn:
    id: "save-text-btn"
- repeat:
    times: 15
    commands:
      - waitForAnimationToEnd
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd

# Verify content appears in list — title is auto-derived from text prefix
- assertVisible: "Der Hund spielt"
