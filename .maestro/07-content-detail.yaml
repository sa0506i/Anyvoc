appId: com.anonymous.Anyvoc
name: "Content detail tabs flow"
---
- launchApp
- waitForAnimationToEnd

# Set native=English, learning=German, level=A1
- tapOn:
    id: "settings-btn"
- waitForAnimationToEnd
- tapOn:
    id: "native-language-btn"
- waitForAnimationToEnd
- tapOn: "English"
- waitForAnimationToEnd
- tapOn:
    id: "learning-language-btn"
- waitForAnimationToEnd
- tapOn: "Deutsch"
- waitForAnimationToEnd
- tapOn: "A1"
- tapOn:
    id: "settings-close-btn"
- waitForAnimationToEnd

# Navigate to Content tab
- tapOn: "Content"
- waitForAnimationToEnd
- assertVisible:
    id: "content-screen"

# Add content
- tapOn: "Add"
- waitForAnimationToEnd
- tapOn:
    id: "menu-enter-text"
- waitForAnimationToEnd

# Type content then title
- tapOn:
    id: "text-input"
- waitForAnimationToEnd
- inputText: "Der Hund spielt im Garten und die Katze schlaeft auf dem Sofa"
- tapOn:
    id: "title-input"
- waitForAnimationToEnd
- inputText: "Detail Test"

# Save and wait for API processing
- tapOn:
    id: "save-text-btn"
- repeat:
    times: 15
    commands:
      - waitForAnimationToEnd

# Dismiss the Done dialog
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd

# The content should be in the list
- assertVisible: "Detail Test"

# Open the content detail
- tapOn: "Detail Test"
- waitForAnimationToEnd

# Verify Original tab is shown by default
- assertVisible:
    id: "content-tab-original"

# Switch to Translation tab
- tapOn:
    id: "content-tab-translation"

# Switch to Vocabulary tab
- tapOn:
    id: "content-tab-vocabulary"

# Switch back to Original tab
- tapOn:
    id: "content-tab-original"
