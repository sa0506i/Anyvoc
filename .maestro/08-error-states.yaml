appId: com.anonymous.Anyvoc
name: "Empty states and edge cases"
---
- launchApp
- waitForAnimationToEnd

# Reset app data to ensure empty states
- tapOn:
    id: "settings-btn"
- waitForAnimationToEnd
- tapOn:
    id: "reset-app-btn"
- tapOn: "Reset"
- waitForAnimationToEnd

# --- Empty state: Trainer ---
- tapOn: "Trainer"
- waitForAnimationToEnd
- assertVisible: "No content"

# --- Empty state: Vocabulary ---
- tapOn: "Vocabulary"
- waitForAnimationToEnd
- assertVisible:
    id: "vocabulary-screen"
- assertVisible: "No content"

# --- Empty state: Content list ---
- tapOn: "Content"
- waitForAnimationToEnd
- assertVisible:
    id: "content-screen"
- assertVisible: "No content"

# --- Add text: Save button is disabled when text is empty ---
- tapOn: "Add"
- waitForAnimationToEnd
- tapOn:
    id: "menu-enter-text"
- waitForAnimationToEnd

# Leave text empty — Save should be disabled (there's no longer a
# separate title field; title is auto-derived from the text).
- hideKeyboard

# Tap save — nothing should happen since button is disabled
- tapOn:
    id: "save-text-btn"

# We should still be on the text modal (not navigated away)
- assertVisible:
    id: "text-input"
