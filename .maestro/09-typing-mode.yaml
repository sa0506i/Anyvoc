appId: com.anonymous.Anyvoc
name: 'Typing quiz mode flow'
---
- launchApp
- waitForAnimationToEnd

# Open settings and switch to Typing mode
- tapOn:
    id: 'settings-btn'
- waitForAnimationToEnd
- assertVisible: 'Quiz Mode'
- tapOn:
    id: 'quiz-mode-typing'
- waitForAnimationToEnd

# Close settings
- tapOn:
    id: 'settings-close-btn'
- waitForAnimationToEnd

# Navigate to trainer
- tapOn: 'Trainer'
- waitForAnimationToEnd

# Start training
- runFlow:
    when:
      visible: 'Start Training'
    commands:
      - tapOn: 'Start Training'
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: 'Continue Training'
    commands:
      - tapOn: 'Continue Training'
      - waitForAnimationToEnd

# If vocab exists, test the typing flow
- runFlow:
    when:
      visible:
        id: 'typing-card'
    commands:
      # Answer up to 25 cards via typing
      - repeat:
          times: 25
          commands:
            - runFlow:
                when:
                  visible:
                    id: 'typing-input'
                commands:
                  # Give up on each card (simplest E2E path)
                  - tapOn:
                      id: 'give-up-btn'
                  - waitForAnimationToEnd
                  # Feedback should be visible
                  - assertVisible:
                      id: 'feedback-box'
                  - tapOn:
                      id: 'next-btn'
                  - waitForAnimationToEnd

      # Round complete screen should be visible
      - assertVisible:
          id: 'round-complete-text'
      - tapOn:
          id: 'end-session-btn'
      - waitForAnimationToEnd

      # Back to overview
      - assertVisible:
          id: 'trainer-screen'

# Switch back to flashcard mode in settings
- tapOn:
    id: 'settings-btn'
- waitForAnimationToEnd
- tapOn:
    id: 'quiz-mode-flashcard'
- tapOn:
    id: 'settings-close-btn'
- waitForAnimationToEnd
