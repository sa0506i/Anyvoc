appId: com.anonymous.Anyvoc
name: 'Login screen shows methods + email validation'
---
- launchApp
- waitForAnimationToEnd

# Pass through welcome if present.
- runFlow:
    when:
      visible:
        id: 'welcome-continue-guest-btn'
    commands:
      - tapOn:
          id: 'welcome-continue-guest-btn'
      - waitForAnimationToEnd

# From tabs → settings → Sign in.
- tapOn:
    id: 'settings-btn'
- waitForAnimationToEnd
- assertVisible: 'Account'

# Only run the Sign-in flow when the user is currently a guest —
# otherwise the Account section shows "Signed in as ...".
- runFlow:
    when:
      visible:
        id: 'settings-sign-in-btn'
    commands:
      - tapOn:
          id: 'settings-sign-in-btn'
      - waitForAnimationToEnd

      # Login screen: email input + Google provider must be visible.
      # Apple is iOS-only, so we don't assert it here.
      - assertVisible:
          id: 'login-email-input'
      - assertVisible:
          id: 'login-method-google'

      # Empty email → submit button disabled (Maestro can't easily assert
      # "disabled" so we just exercise the happy path: valid email makes
      # the button live, tap it — no network expectation, we leave the
      # flow before the OTP email arrives).
      - tapOn:
          id: 'login-email-input'
      - inputText: 'maestro-e2e@example.com'
      - hideKeyboard

      # Back out of the login screen — we don't want to trigger a real
      # OTP send in CI.
      - tapOn:
          id: 'login-back-btn'
      - waitForAnimationToEnd

      # We're back in settings.
      - assertVisible: 'Account'
      - tapOn:
          id: 'settings-close-btn'
      - waitForAnimationToEnd
      - assertVisible:
          id: 'trainer-screen'
