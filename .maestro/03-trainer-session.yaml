appId: com.anonymous.Anyvoc
name: "Trainer session flow"
---
- launchApp
- waitForAnimationToEnd
- tapOn: "Trainer"
- waitForAnimationToEnd

# Start training (button varies depending on due cards)
- runFlow:
    when:
      visible: "Start Training"
    commands:
      - tapOn: "Start Training"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue Training"
    commands:
      - tapOn: "Continue Training"
      - waitForAnimationToEnd

# If no vocab exists, we'll see the empty state — skip session test
- runFlow:
    when:
      visible:
        id: "flashcard"
    commands:
      # Answer up to 25 cards (covers default 20 + retries)
      - repeat:
          times: 25
          commands:
            - runFlow:
                when:
                  visible:
                    id: "flashcard"
                commands:
                  - tapOn:
                      id: "flashcard"
                  - tapOn:
                      id: "correct-btn"

      # Round complete screen should be visible
      - assertVisible:
          id: "round-complete-text"
      - tapOn:
          id: "end-session-btn"
      - waitForAnimationToEnd

      # Back to overview
      - assertVisible:
          id: "trainer-screen"
