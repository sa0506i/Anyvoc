# fly.toml app configuration file generated for anyvoc-backend on 2026-03-27T12:07:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'anyvoc-backend'
primary_region = 'cdg'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
